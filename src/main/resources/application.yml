server:
  address: 0.0.0.0

spring:
  application:
    name: conx-server

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret:
    key: ${JWT_SECRET_KEY}

springdoc:
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs