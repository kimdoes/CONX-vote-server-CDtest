spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vote_test?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

jwt:
  secret:
    key: ${JWT_SECRET_KEY}