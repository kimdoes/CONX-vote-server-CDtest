name: CEOS vote server CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: vote_test
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_USER: vote
          MYSQL_PASSWORD: votepassword
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Build with Gradle Wrapper
        run: ./gradlew build