name: CEOS vote server CD
on:
  workflow_run:
    workflows:
      - "CEOS vote server CI"
    types:
      - completed

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Build with Gradle Wrapper
        run: ./gradlew build -x test

      - name: Setting Buildx Docker
        uses: docker/setup-buildx-action@v3

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            contactconx/conx-vote-server:latest
            contactconx/conx-vote-server:${{ github.event.workflow_run.head_sha }}
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ubuntu
            key: ${{ secrets.EC2_KEY }}
            script: |
              cd /home/ubuntu/spring-vote-23rd
              
              cat > .env << 'EOF'
              IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
              DB_URL=${{ secrets.DB_URL }}
              DB_USERNAME=vote
              #실제 배포 시에는 admin으로 바꿔야합니다
              
              DB_PASSWORD=${{ secrets.DB_PASSWORD }}
              JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
              SPRING_PROFILES_ACTIVE=test
              EOF
              
              docker compose -p conx-vote-server pull
              docker compose -p conx-vote-server up -d --force-recreate
              
              for i in {1..15}; do
                if curl -f http://localhost:8081/health/ready; then
                  echo "Health Check passed"
                  break
                fi
                echo "Waiting for Service..."
                sleep 5
              done
  
              curl -f http://localhost:8081/health/ready || exit 1
              
              sudo docker image prune -f